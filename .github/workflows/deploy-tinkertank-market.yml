# =============================================================================
# TinkerTank Market EKS Deployment Workflow
# Builds Docker image, pushes to ECR, and deploys to EKS
# =============================================================================

name: Deploy TinkerTank Market

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-2' }}
  DOMAIN: tinkertank.rocks
  NODE_ENV: production
  REPO_NAME: tinkertank-market
  EKS_CLUSTER_NAME: tinkertank-dev

# Required for OIDC authentication with AWS (if configured)
permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Type Check Job (runs on x86)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Debug - Check types installation
        run: |
          echo "=== Checking @types/react ==="
          ls -la node_modules/@types/react/ || echo "Not found"
          echo "=== Checking react ==="
          ls -la node_modules/react/ || echo "Not found"

      - name: Run type check
        run: npm run type-check

  # ---------------------------------------------------------------------------
  # Build and Deploy Job (runs on native ARM64)
  # ---------------------------------------------------------------------------
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-24.04-arm
    needs: typecheck
    
    steps:
      # -----------------------------------------------------------------------
      # Checkout and Setup
      # -----------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Download envsubst utility
      # -----------------------------------------------------------------------
      - name: Download envsubst
        run: |
          curl -L "https://github.com/a8m/envsubst/releases/download/v1.4.2/envsubst-Linux-arm64" -o "envsubst"
          chmod +x envsubst

      # -----------------------------------------------------------------------
      # AWS Authentication
      # -----------------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # -----------------------------------------------------------------------
      # ECR Login and Repository Setup
      # -----------------------------------------------------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR Repository if not exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.REPO_NAME }} --region ${{ env.AWS_REGION }} || \
          aws ecr create-repository --repository-name ${{ env.REPO_NAME }} --region ${{ env.AWS_REGION }}

      # -----------------------------------------------------------------------
      # Docker Build and Push (native ARM64)
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.REPO_NAME }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.REPO_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/arm64

      # -----------------------------------------------------------------------
      # EKS Deployment
      # -----------------------------------------------------------------------
      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER_NAME }}

      # The new application requires both its additive schema migration and the
      # canonical Ignite Product/Location rows. Run both in-cluster with the new
      # image before changing the Deployment, so old pods keep serving safely if
      # either preflight step fails.
      - name: Run Database Preflight
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/${{ env.REPO_NAME }}:${{ github.sha }}
        run: |
          POD_NAME="${REPO_NAME}-db-preflight-${GITHUB_SHA::8}"

          cleanup() {
            kubectl --namespace=default logs "$POD_NAME" 2>/dev/null || true
            kubectl --namespace=default delete pod "$POD_NAME" --ignore-not-found=true --wait=false
          }
          trap cleanup EXIT

          kubectl --namespace=default run "$POD_NAME" \
            --image="$IMAGE" \
            --image-pull-policy=Always \
            --restart=Never \
            --overrides='{"spec":{"nodeSelector":{"kubernetes.io/arch":"arm64"},"tolerations":[{"key":"karpenter.sh/controller","operator":"Equal","value":"true","effect":"NoSchedule"}]}}' \
            --env="DATABASE_URL=$DATABASE_URL" \
            --env="NEXT_PUBLIC_STRIPE_MODE=production" \
            --command -- sh -c 'npx prisma@6.15.0 migrate deploy && node seed-ignite-products-locations.js'

          for attempt in $(seq 1 60); do
            PHASE=$(kubectl --namespace=default get pod "$POD_NAME" -o jsonpath='{.status.phase}')
            if [ "$PHASE" = "Succeeded" ]; then
              echo "Database migration and Ignite seed completed successfully."
              exit 0
            fi
            if [ "$PHASE" = "Failed" ]; then
              echo "Database preflight failed."
              exit 1
            fi
            sleep 5
          done

          echo "Database preflight timed out."
          exit 1

      - name: Substitute Environment Variables in K8s Template
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          NEXT_PUBLIC_APP_URL: https://${{ env.DOMAIN }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ./envsubst < .github/k8s/deployment-template.yml > ${REPO_NAME}.yml
          echo "Rendered TinkerTank Market deployment manifest."

      - name: Apply Kubernetes Deployment
        run: |
          echo "Deploying TinkerTank Market to EKS..."
          kubectl --namespace=default apply -f ${REPO_NAME}.yml

      - name: Wait for Deployment to be Ready
        run: |
          echo "Waiting for deployment to be ready..."
          kubectl --namespace=default rollout status deployment/${REPO_NAME}-${NODE_ENV} --timeout=5m

      - name: Verify Deployment
        run: |
          echo "Deployment Status:"
          kubectl --namespace=default get deployment ${REPO_NAME}-${NODE_ENV}
          echo ""
          echo "Pod Status:"
          kubectl --namespace=default get pods -l app=${REPO_NAME}
          echo ""
          echo "Service Status:"
          kubectl --namespace=default get svc ${REPO_NAME}-${NODE_ENV}
          echo ""
          echo "Ingress Status:"
          kubectl --namespace=default get ingress ${REPO_NAME}-${NODE_ENV}
